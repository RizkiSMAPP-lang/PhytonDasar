<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Saya</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
        }

        td {
            padding: 8px;
        }

        .label {
            font-weight: bold;
            width: 180px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>BIODATA DIRI</h1>

    <table>
        <tr>
            <td class="label">Nama</td>
            <td>: Nama Anda</td>
        </tr>
        <tr>
            <td class="label">Tempat, Tanggal Lahir</td>
            <td>: Kota Anda, DD-MM-YYYY</td>
        </tr>
        <tr>
            <td class="label">Jenis Kelamin</td>
            <td>: Laki-laki / Perempuan</td>
        </tr>
        <tr>
            <td class="label">Riwayat Pendidikan</td>
            <td>
                :
                <ul>
                    <li>SD: Nama Sekolah</li>
                    <li>SMP: Nama Sekolah</li>
                    <li>SMA/SMK: Nama Sekolah</li>
                    <li>Kuliah: Nama Universitas (jika ada)</li>
                </ul>
            </td>
        </tr>
        <tr>
            <td class="label">Pekerjaan</td>
            <td>: Pekerjaan Anda</td>
        </tr>
    </table>
</div>

</body>
</html>
